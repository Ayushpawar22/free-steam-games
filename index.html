<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Steam Games - Cinematic Experience</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="desktop">
        <div class="folder" id="folder">
            <div class="folder-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 8L3 18C3 19.1046 3.89543 20 5 20H19C20.1046 20 21 19.1046 21 18V9C21 7.89543 20.1046 7 19 7H10L8 4H5C3.89543 4 3 4.89543 3 6L3 8Z" fill="currentColor"/>
                </svg>
            </div>
            <div class="folder-label">Free Game Accounts</div>
        </div>

        <div class="folder-content" id="folderContent">
            <div class="game-grid">
                <div class="game-poster" id="rePoster" data-game="Resident Evil Requiem">
                    <img src="https://images.pexels.com/photos/7887826/pexels-photo-7887826.jpeg?auto=compress&cs=tinysrgb&w=800" alt="Resident Evil Requiem">
                    <div class="poster-title">Resident Evil Requiem</div>
                </div>
                <div class="game-poster" data-game="Cyberpunk 2077">
                    <img src="https://images.pexels.com/photos/3945683/pexels-photo-3945683.jpeg?auto=compress&cs=tinysrgb&w=800" alt="Cyberpunk 2077">
                    <div class="poster-title">Cyberpunk 2077</div>
                </div>
                <div class="game-poster" data-game="The Witcher 3">
                    <img src="https://images.pexels.com/photos/371924/pexels-photo-371924.jpeg?auto=compress&cs=tinysrgb&w=800" alt="The Witcher 3">
                    <div class="poster-title">The Witcher 3</div>
                </div>
                <div class="game-poster" data-game="Dark Souls">
                    <img src="https://images.pexels.com/photos/1293261/pexels-photo-1293261.jpeg?auto=compress&cs=tinysrgb&w=800" alt="Dark Souls">
                    <div class="poster-title">Dark Souls</div>
                </div>
            </div>
        </div>

        <div class="claim-card" id="claimCard">
            <div class="card-glow"></div>
            <div class="card-content">
                <h2>Game: Resident Evil Requiem</h2>
                <button class="claim-button" id="claimButton">Claim Account</button>
                <div class="claim-link">
                    <a href="https://linkpays.in/og6mqxm" target="_blank">https://linkpays.in/og6mqxm</a>
                </div>
            </div>
            <div class="particles" id="particles"></div>
        </div>

        <div class="cursor" id="cursor">
            <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 3L10.07 19.97L12.58 12.58L19.97 10.07L3 3Z" stroke="black" stroke-width="0.5"/>
            </svg>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
